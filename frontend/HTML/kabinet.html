<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Личный кабинет</title>
<link rel="stylesheet" href="../CSS/kabinet.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo"> DriveCar</div>
    <a href="../index.html"><span class="icon"></span> Главная</a>
    <a href="../HTML/catalog.html"><span class="icon"></span> Каталог</a>
    <a href="../HTML/kontakt.html"><span class="icon"></span> Контакты </a>
</div>

<div class="main">

    <div class="profile-card">
        <div class="avatar-wrap">
            <div class="avatar" id="avatarDisplay"></div>
            <div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()">
                <br>Сменить
            </div>
            <input type="file" id="avatarInput" accept="image/*" onchange="changeAvatar(event)">
        </div>
        <div class="profile-info">
            <div class="profile-name" id="userName">Гость</div>
            <div class="profile-email" id="userEmail"></div>
            <div class="profile-badge">Пользователь</div>
        </div>
    </div>

    <div class="payment-card">
        <div class="section-title">Платёжные данные</div>
        <div class="card-display">
            <div class="card-label">Номер карты</div>
            <div class="card-number-display" id="cardDisplay">
                <span class="empty">Карта не привязана</span>
            </div>
        </div>
        <div class="card-input-row">
            <input type="text" id="cardInput" placeholder="Введите номер карты" maxlength="19" oninput="formatCard(this)">
            <button class="btn-save" onclick="saveCard()">Привязать</button>
        </div>
        <div class="card-hint">Номер карты хранится только в вашем браузере</div>
    </div>

    <div class="payments-section">
        <div class="section-title">Принимаем к оплате</div>
        <div class="payments-grid">
            <div class="pay-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Google_Pay_Logo.svg/512px-Google_Pay_Logo.svg.png" alt="Google Pay">
            </div>
            <div class="pay-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
            </div>
            <div class="pay-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            </div>
            <div class="pay-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/UnionPay_logo.svg/512px-UnionPay_logo.svg.png" alt="UnionPay">
            </div>
        </div>
    </div>

</div>
<div class="toast" id="toast"></div>
<script src="/JS/сabinet.js"></script>
</body>
</html>
